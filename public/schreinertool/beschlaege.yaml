# ==========================================
# REGELN PRO KORPUS-TEIL (c3cad-native)
# ==========================================
# l = linke seite
# r = rechte seite
# g = ground (boden)
# t = top (deckel)
# b = back (rückwand)
# c = fachboden

regeln:

  f:   # front
    beschlaege:
      - ref: topfscharnier_110
        min: 2
        pro_m2: 4

      - ref: griff_standard
        fix: 1

  g:   # ground / boden
    beschlaege:
      - ref: exzenterverbinder
        fix: 4

  t:   # top / deckel
    beschlaege:
      - ref: exzenterverbinder
        fix: 4

  c:   # fachboden
    beschlaege:
      - ref: fachbodentraeger
        fix: 4

  b:   # back / rückwand
    beschlaege:
      - ref: universal-winkel-verbinder
        pro_m2: 4

  l: {}   # linke seite (keine beschläge)
  r: {}   # rechte seite (keine beschläge)
