  <script>

    /* =========================================================
       FARBEN
    ========================================================= */
    const DEFAULT_COLORS = {
      white: { de: "White", css: "#ffffff" },
      wheat: { de: "Wheat", css: "#f5deb3" },
      cornflowerblue: { de: "Cornflower Blue", css: "#6495ed" },
      gray: { de: "Gray", css: "#808080" },
      anthracite: { de: "Anthracite", css: "#2b2b2b" },
      burlywood: { de: "Burlywood", css: "#deb887" },
      darkseagreen: { de: "Dark Sea Green", css: "#8fbc8f" },
      indianred: { de: "Indian Red", css: "#cd5c5c" },
      terracotta: { de: "Terracotta", css: "#b06040" },
      maroon: { de: "Maroon", css: "#800000" }
    };
    var colors = { ...DEFAULT_COLORS };
    window.colors = colors;
    function applyColorLabels(messages) {
      if (!messages?.colors) return;
      Object.entries(messages.colors).forEach(([key, label]) => {
        if (colors[key]) colors[key].de = label;
      });
    }
    window.colorsReady = fetch("color.json")
      .then(res => {
        if (!res.ok) throw new Error(`color.json ${res.status}`);
        return res.json();
      })
      .then(data => {
        Object.assign(colors, data || {});
        applyColorLabels(window.ST_I18N);
        return colors;
      })
      .catch(err => {
        console.error("color.json konnte nicht geladen werden", err);
        return colors;
      });
    window.ST_I18N_READY?.then(messages => window.colorsReady.then(() => applyColorLabels(messages)));

    window.FREE_LIMITS = {
      projectParts: { free: 100, pro: 600 },
      holzliste: { insideFreeLines: 60, exportFreeLines: 100, freeLines: 100 },
      cutplan: { freePlates: 1 }
    };
    window.freeLimitsReady = fetch("free-limits.json")
      .then(res => {
        if (!res.ok) throw new Error(`free-limits.json ${res.status}`);
        return res.json();
      })
      .then(data => {
        window.FREE_LIMITS = {
          ...window.FREE_LIMITS,
          ...(data || {}),
          projectParts: {
            ...window.FREE_LIMITS.projectParts,
            ...(data?.projectParts || {})
          },
          holzliste: {
            ...window.FREE_LIMITS.holzliste,
            ...(data?.holzliste || {})
          },
          cutplan: {
            ...window.FREE_LIMITS.cutplan,
            ...(data?.cutplan || {})
          }
        };
        window.PROJECT_PART_LIMITS = window.FREE_LIMITS.projectParts;
        return window.FREE_LIMITS;
      })
      .catch(err => {
        console.error("free-limits.json konnte nicht geladen werden", err);
        window.PROJECT_PART_LIMITS = window.FREE_LIMITS.projectParts;
        return window.FREE_LIMITS;
      });

    function initColorSelect(sel) {
      sel.innerHTML = "";

      Object.entries(colors).forEach(([key, val]) => {
        const opt = document.createElement("option");
        const di = document.createElement("div");
        opt.value = key;
        di.textContent = "col";
        opt.textContent = `${key} – ${val.de}`;

        // ✅ Farbe liegt im Eintrag → direkt benutzen
        di.style.backgroundColor = "red";
        // opt.style.background = val.css;
        opt.style.color = isLightColor(val.css) ? "#000" : "#fff";

        opt.appendChild(di);
        sel.appendChild(opt);
      });

      // initial auch das Select einfärben
      updateSelectColor(sel);
    }

    function updateSelectColor(sel) {
      const c = colors[sel.value];
      if (!c) return;

      sel.style.backgroundColor = c.css;
      sel.style.color = isLightColor(c.css) ? "#000" : "#fff";
    }



    function isLightColor(css) {
      const hex = String(css || "").trim().match(/^#?([0-9a-f]{6})$/i)?.[1];
      if (!hex) return false;
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);
      return (r * 299 + g * 587 + b * 114) / 1000 > 175;
    }

    // Farbe abdunkeln/aufhellen
    function applyLight(css, idx) {
      const f = (12 - idx) * 6;
      return `color-mix(in srgb, ${css}, black ${Math.max(0, f)}%)`;
    }
    /* =========================================================
       STATE
    ========================================================= */
    const projectState = {
      name: "",
      materials: []
    };
  </script>

  <script type="module">
	    import { magie } from "./main.js?v=arrayparse38";
	    import { DEFAULT_CORPUS, normalizeCornerRefs, urlToInn } from "./fu.js?v=dockparse1";
	    import { expandAliases, materializeAliases } from "./alias.js?v=dockparse1";
	    import { convertLegacyToModern } from "./legacy-converter.js?v=dockparse1";

    // ---------------------------------------------
    // Projekt vom Server laden (EINZIGE Quelle)
    // ---------------------------------------------
    async function loadProjFromServer(text) {
        const engineText = expandAliases(text);
	      const url = "/getProj?text=" + encodeURIComponent(engineText);
	      const res = await fetch(url);
	
	      if (!res.ok) {
	        const data = await res.clone().json().catch(() => null);
          let message = data && data.error ? data.error : "";
          if (!message) message = await res.text();
          if (/Invalid or unexpected token/i.test(message)) {
            message = "Projekt konnte nicht gelesen werden: Ein Wert oder Ausdruck ist syntaktisch ungültig.";
          }
	        const err = new Error(message);
          if (data && data.code === "PROJECT_PART_LIMIT") err.name = "ProjectPartLimitError";
          if (data && data.line) err.line = data.line;
          if (data && data.token) err.token = data.token;
	        throw err;
	      }

      const pr = normalizeCornerRefs(await res.json());
      console.log("✅ Projekt vom Server geladen:", pr);
      window.PR = pr;
      return pr;
    }

    // ---------------------------------------------
    // EINZIGER Startpunkt der App
    // ---------------------------------------------
	    (async () => { 
        let startupText = "";
      try {
      await window.colorsReady;
      await window.freeLimitsReady;
      const parsed = urlToInn(window.location.href);
      let text = convertLegacyToModern(materializeAliases(parsed || ""));
      if (/^test\s+mat\.19,(?:bt,f|wheat),14,1\s+mat\.16,(?:bl,e|cornflowerblue),16(?:,0)?\s*\r?\na\s*$/i.test(text)) {
        text = DEFAULT_CORPUS;
      }
      startupText = text;
console.log("🚀 STARTING APP with text:", text)   ;
      // optional: textarea synchron halten (nur Anzeige!)
      const ta = document.getElementById("inn");
      if (ta) ta.value = text;

      // 🔑 Projekt kommt AUSSCHLIESSLICH vom Server
      const PR = await loadProjFromServer(text);
      window.PR = PR
      if (text.trim()) PR.inn = text;
      if (window.validateProjectPartLimit) await window.validateProjectPartLimit(PR);
      if (ta) ta.value = PR?.inn || text;
      window.syncInnEditorFromTextarea?.();
	      // 🔥 Render
	      await magie(PR);
      window.syncEditHistoryToCurrent?.();
      window.updateToolbarStatus?.();
	
	      } catch (err) {
	        console.error("❌ APP START FAILED:", err);
          window.showInnProjectError?.(startupText, err);
      }
	    })();
  </script>
